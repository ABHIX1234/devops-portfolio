version: "3.9"

services:
  # ── Production build (nginx) ──────────────────────────
  portfolio:
    build:
      context: .
      target: runner
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    image: devops-portfolio:latest
    container_name: devops-portfolio
    ports:
      - "80:80"
    restart: unless-stopped

  # ── Local development (Vite HMR) ─────────────────────
  portfolio-dev:
    build:
      context: .
      target: builder
    image: devops-portfolio-dev:latest
    container_name: devops-portfolio-dev
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules       # keep container's node_modules isolated
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    profiles:
      - dev                     # only starts when: docker compose --profile dev up
